<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f4f9;
            color: #1f1f1f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }

        .auth-container {
            background-color: #ffffff;
            border-radius: 28px;
            width: 100%;
            max-width: 440px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .google-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        .title {
            font-size: 24px;
            font-weight: 400;
            text-align: center;
            margin-bottom: 8px;
            color: #1f1f1f;
        }

        .subtitle {
            font-size: 15px;
            color: #444746;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #dadce0;
            background-color: #fff;
            color: #3c4043;
            transition: background-color 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }

        .btn:hover {
            background-color: #f8f9fa;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        }

        .footer {
            font-size: 12px;
            color: #5f6368;
            margin-top: 24px;
            text-align: center;
            padding-top: 16px;
            line-height: 1.5;
            border-top: 1px solid #f1f3f4;
        }

        .footer a {
            color: #0b57d0;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
        
        #loadingStatus {
            font-size: 13px;
            color: #5f6368;
            display: none;
            margin-top: 16px;
        }
        .error-msg {
            color: #d93025;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }
    </style>
    <script type="module" src="firebase-init.js"></script>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>
    <div class="auth-container">
        <!-- Google Logo SVG -->
        <div class="google-logo">
            <svg width="40" height="40" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
            </svg>
        </div>

        <div id="loginPromptContainer" style="text-align: center;">
            <h1 class="title">Choose an account</h1>
            <p class="subtitle">to continue to HackstreetBoys Portal</p>
            
            <div style="margin: 28px 0; display: flex; flex-direction: column; align-items: center; gap: 16px;">
                <button class="btn" onclick="signInWithGoogle()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 18px; height: 18px;">
                    Continue with Google
                </button>
                
                <div id="loadingStatus">
                     Securing session credentials...
                </div>
                <div id="errorStatus" class="error-msg"></div>
            </div>
        </div>

        <div class="footer">
            To continue, Google will share your name, email address, language preference, and profile picture with HackstreetBoys. See their <a href="#">Privacy Policy</a> and <a href="#">Terms of Service</a>.
        </div>
    </div>

    <script>
        const GOOGLE_CLIENT_ID = '69718901140-s909nq2pibvf26sdcuh068e8iq14mva7.apps.googleusercontent.com';
        let gisReady = false;
        let tokenClient = null;

        // Poll for GIS library to load
        const gisCheck = setInterval(() => {
            if (window.google && window.google.accounts && window.google.accounts.oauth2) {
                gisReady = true;
                clearInterval(gisCheck);
                tokenClient = window.google.accounts.oauth2.initTokenClient({
                    client_id: GOOGLE_CLIENT_ID,
                    scope: 'openid profile email',
                    prompt: 'select_account',
                    callback: async (tokenResponse) => {
                        if (tokenResponse.error) {
                            console.error('Google Sign-In Error:', tokenResponse.error);
                            const errorEl = document.getElementById('errorStatus');
                            const statusEl = document.getElementById('loadingStatus');
                            if (statusEl) statusEl.style.display = 'none';
                            if (errorEl) {
                                errorEl.style.display = 'block';
                                errorEl.textContent = tokenResponse.error_description || 'Sign-in cancelled or failed.';
                            }
                            return;
                        }
                        await handleGoogleToken(tokenResponse);
                    }
                });
            }
        }, 100);

        async function signInWithGoogle() {
            const statusEl = document.getElementById('loadingStatus');
            const errorEl = document.getElementById('errorStatus');
            
            if (errorEl) errorEl.style.display = 'none';
            if (statusEl) statusEl.style.display = 'block';

            if (!gisReady || !tokenClient) {
                if (errorEl) {
                    errorEl.style.display = 'block';
                    errorEl.textContent = 'Google Identity Services library is not loaded yet. Please try again in a moment.';
                }
                if (statusEl) statusEl.style.display = 'none';
                return;
            }

            try {
                tokenClient.requestAccessToken();
            } catch (error) {
                console.error("GIS Token Request Error:", error);
                if (statusEl) statusEl.style.display = 'none';
                if (errorEl) {
                    errorEl.style.display = 'block';
                    errorEl.textContent = error.message || 'Failed to start Google sign-in.';
                }
            }
        }

        async function handleGoogleToken(tokenResponse) {
            const statusEl = document.getElementById('loadingStatus');
            const errorEl = document.getElementById('errorStatus');

            try {
                // Fetch user info directly from Google's userinfo endpoint using the access token
                const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                    headers: {
                        'Authorization': `Bearer ${tokenResponse.access_token}`
                    }
                });
                if (!res.ok) throw new Error('Failed to retrieve user profile from Google.');
                const profile = await res.json();

                const expiry = Date.now() + 60 * 60 * 1000; // 60 minutes
                const sessionUser = {
                    name: profile.name,
                    email: profile.email,
                    expiry: expiry,
                    avatar: profile.picture || 'custom'
                };
                localStorage.setItem('sessionUser', JSON.stringify(sessionUser));

                // Sync user profile into the profiles database module
                try {
                    const profRes = await fetch('/api/profile');
                    let profiles = [];
                    if (profRes.ok) {
                        profiles = await profRes.json();
                    }
                    if (!Array.isArray(profiles)) {
                        profiles = [];
                    }

                    let myProfileIdx = profiles.findIndex(p => p.email && p.email.toLowerCase() === profile.email.toLowerCase());
                    if (myProfileIdx === -1) {
                        profiles.push({
                            email: profile.email,
                            name: profile.name,
                            avatar: profile.picture || '',
                            role: 'Software Engineer',
                            department: 'Development',
                            bio: 'Hi, I am new to the portal! Connected via Google authentication.'
                        });
                    } else {
                        profiles[myProfileIdx].avatar = profile.picture || profiles[myProfileIdx].avatar;
                        if (!profiles[myProfileIdx].name) {
                            profiles[myProfileIdx].name = profile.name;
                        }
                    }

                    await fetch('/api/profile', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(profiles)
                    });
                } catch (e) {
                    console.error("Failed to sync profile data:", e);
                }

                // Notify parent window and close popup
                if (window.opener) {
                    window.opener.postMessage({ type: 'LOGIN_SUCCESS' }, '*');
                }
                window.close();
            } catch (error) {
                console.error("Google Profile Retrieval Error:", error);
                if (statusEl) statusEl.style.display = 'none';
                if (errorEl) {
                    errorEl.style.display = 'block';
                    errorEl.textContent = error.message || 'Authentication failed.';
                }
            }
        }
    </script>
</body>
</html>
