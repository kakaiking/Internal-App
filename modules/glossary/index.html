<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../apps/styles.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Top header row -->
        <div class="header-container"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
            <h2 style="margin: 0 auto; border-bottom: none; padding-bottom: 0; font-size: 1.8rem;">
                <i class="fa-solid fa-spell-check" style="color: #2dd4bf;"></i> Company Terminology Glossary
            </h2>
        </div>

        <!-- Search Bar & Action -->
        <div class="header-actions" style="margin-bottom: 24px; display: flex; gap: 16px;">
            <div class="search-input-wrapper" style="flex: 1;">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchBar" placeholder="Search glossary by keyword..." oninput="render()">
            </div>
            <button onclick="openGlossaryModal()" style="width: auto; padding: 10px 18px; font-size: 0.9rem; background: #2dd4bf; border-color: #2dd4bf; color: #111827; font-weight: 600;">
                <i class="fa-solid fa-plus-circle"></i> Add Term
            </button>
        </div>

        <div style="display: flex; flex-direction: column; gap: 16px;">
            <!-- Alphabet Filter Bar -->
            <div id="alphabetBar" style="display:flex; flex-wrap:wrap; gap:4px; margin-bottom:12px; background:rgba(0,0,0,0.15); padding:8px; border-radius:10px; border:1px solid rgba(255,255,255,0.03); justify-content:center;"></div>
            
            <!-- List Panel -->
            <div>
                <div id="glossaryList" class="list-container" style="display: flex; flex-direction: column; gap: 16px;"></div>
            </div>
        </div>
    </div>

    <!-- Register Term Modal -->
    <div id="glossaryModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto; color: #2dd4bf;"><i class="fa-solid fa-file-signature"></i> Register Terminology</h3>
                <span class="close-btn" onclick="closeGlossaryModal()">&times;</span>
            </div>
            <div class="modal-body">
                <label for="termWord" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px;">Term / Abbreviation</label>
                <input type="text" id="termWord" placeholder="e.g. AWS, CI/CD, SaaS" required>
                
                <label for="termDefinition" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top: 14px;">Term Definition</label>
                <textarea id="termDefinition" placeholder="Write a comprehensive definition or corporate context..." required style="min-height: 120px;"></textarea>
                
                <button onclick="addTerm()" style="margin-top:20px; background: #2dd4bf; border-color: #2dd4bf; color: #111827; font-weight: 600;"><i class="fa-solid fa-plus"></i> Add Definition</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
