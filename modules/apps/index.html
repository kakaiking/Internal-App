<!-- modules/apps/index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/session-check.js"></script>
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>App Registry Directory</title>
</head>

<body>
    <div class="container">
        <!-- Top header row -->
        <div class="header-container"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
            <h2 style="margin: 0 auto; border-bottom: none; padding-bottom: 0; font-size: 1.8rem;">
                Our Digital Suite
            </h2>
        </div>
        <!-- Search Bar -->
        <div class="header-actions" style="margin-bottom: 24px;">
            <div class="search-input-wrapper">
                
                <input type="text" id="searchApps" placeholder="Search by name or description..."
                    oninput="renderApps()">
            </div>
            <button onclick="openModal()" style="width: auto; padding: 10px 18px; font-size: 0.9rem;">
                 New App
            </button>
        </div>
        <!-- Apps List Grid -->
        <div id="appList" class="apps-grid"></div>
    </div>

    <!-- Registration Modal -->
    <div id="registerModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto;">Register New App</h3>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <label for="appName" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px;">App
                    Name</label>
                <input type="text" id="appName" placeholder="e.g. HR Portal Dashboard" required>

                <label style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px;">App
                    Description</label>
                <div class="rte-wrapper">
                    <div class="rte-toolbar" data-target="appDesc">
                        <button type="button" data-cmd="bold" title="Bold"><i class="fas fa-bold"></i></button>
                        <button type="button" data-cmd="italic" title="Italic"><i class="fas fa-italic"></i></button>
                        <button type="button" data-cmd="underline" title="Underline"><i class="fas fa-underline"></i></button>
                        <span class="rte-divider"></span>
                        <button type="button" data-cmd="insertUnorderedList" title="Bullet list"><i class="fas fa-list-ul"></i></button>
                        <button type="button" data-cmd="insertOrderedList" title="Numbered list"><i class="fas fa-list-ol"></i></button>
                        <span class="rte-divider"></span>
                        <button type="button" data-cmd="createLink" title="Insert link"><i class="fas fa-link"></i></button>
                        <button type="button" data-cmd="removeFormat" title="Clear formatting"><i class="fas fa-eraser"></i></button>
                    </div>
                    <div id="appDesc" class="rte-editor" contenteditable="true"
                        data-placeholder="e.g. Backoffice tool managing employee documents and time-off tracking.">
                    </div>
                </div>

                <!-- <label for="appChangelog"
                    style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:12px;">Initial
                    Changelog Entry</label>
                <textarea id="appChangelog"
                    placeholder="e.g. Release v1.0.0: Configured OAuth and initial user migration." required></textarea> -->

                <label for="appGithubRepo"
                    style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:12px;">GitHub
                    Repo (optional)</label>
                <input type="text" id="appGithubRepo" placeholder="e.g. octocat/hello-world">

                <button onclick="addApp()"> Register App</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto;">Edit App</h3>
                <span class="close-btn" onclick="closeEditModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editAppId">
                <label for="editAppName" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px;">App
                    Name</label>
                <input type="text" id="editAppName" placeholder="e.g. HR Portal Dashboard" required>

                <label style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px;">App
                    Description</label>
                <div class="rte-wrapper">
                    <div class="rte-toolbar" data-target="editAppDesc">
                        <button type="button" data-cmd="bold" title="Bold"><i class="fas fa-bold"></i></button>
                        <button type="button" data-cmd="italic" title="Italic"><i class="fas fa-italic"></i></button>
                        <button type="button" data-cmd="underline" title="Underline"><i class="fas fa-underline"></i></button>
                        <span class="rte-divider"></span>
                        <button type="button" data-cmd="insertUnorderedList" title="Bullet list"><i class="fas fa-list-ul"></i></button>
                        <button type="button" data-cmd="insertOrderedList" title="Numbered list"><i class="fas fa-list-ol"></i></button>
                        <span class="rte-divider"></span>
                        <button type="button" data-cmd="createLink" title="Insert link"><i class="fas fa-link"></i></button>
                        <button type="button" data-cmd="removeFormat" title="Clear formatting"><i class="fas fa-eraser"></i></button>
                    </div>
                    <div id="editAppDesc" class="rte-editor" contenteditable="true"
                        data-placeholder="e.g. Backoffice tool managing employee documents and time-off tracking.">
                    </div>
                </div>

                <!-- <label for="editAppChangelog"
                    style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:12px;">Add
                    Changelog Entry (optional)</label>
                <textarea id="editAppChangelog" placeholder="e.g. Release v1.1.0: Fixed mobile styling bug."></textarea> -->

                <label for="editAppGithubRepo"
                    style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:12px;">GitHub
                    Repo (optional)</label>
                <input type="text" id="editAppGithubRepo" placeholder="e.g. octocat/hello-world">

                <button onclick="saveEditApp()"> Save Changes</button>
            </div>
        </div>
    </div>

    <script type="module" src="../../firebase-init.js"></script>
    <script src="app.js"></script>
</body>

</html>
