<!-- modules/apps/detail.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../../session-check.js"></script>
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome Icons -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <title>App Details</title>
    <script src="../../env-config.js"></script>
    <script type="module" src="../../firebase-init.js"></script>
</head>

<body>
    <div class="container">
        <div id="detailHeader">
            <h2 id="appNameHeader" style="margin-bottom: 5px; border-bottom: none; padding-bottom: 0">Loading...</h2>
        </div>
        <!-- Loader Section -->
        <div id="detailLoader" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 260px; width: 100%">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2.5rem; color: var(--accent, #6366f1)"></i>
        </div>

        <!-- Content Section (Initially Hidden) -->
        <div id="detailContent" style="display: none">
            <!-- Tabs Container -->
            <div class="tabs-container">
            <button class="tab-btn active" onclick="switchDetailTab('description')">
                Description
            </button>
            <button class="tab-btn" onclick="switchDetailTab('changelogs')">
                Changelogs
            </button>
            <button class="tab-btn" onclick="switchDetailTab('tickets')">
                Tickets
            </button>
        </div>
        <!-- Tab Contents -->
        <div id="tab-description" class="tab-content">
            <div class="card">
                <div id="appDescriptionText" style="line-height: 1.6; color: #cbd5e1; font-size: 1rem"></div>
            </div>
        </div>
        <div id="tab-changelogs" class="tab-content" style="display: none">
            <!-- Removed manual Changelog History card -->
            <div class="card" id="githubCommitsCard">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px">
                    <h4 style="margin: 0; color: white">
                        Recent Commits
                    </h4>
                    <button class="secondary-btn"
                        style="padding: 6px 12px; font-size: 0.85rem; width: auto; border-radius: 8px"
                        onclick="handleRefreshCommits()">
                        Refresh
                    </button>
                </div>
                <div id="githubCommitsContainer">
                    <!-- Rendered dynamically -->
                </div>
            </div>
        </div>
        <div id="tab-tickets" class="tab-content" style="display: none">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px">
                    <h4 style="margin: 0; color: white"> Support Tickets</h4>
                    <button class="secondary-btn"
                        style="padding: 6px 12px; font-size: 0.85rem; width: auto; border-radius: 8px"
                        onclick="handleFileTicket()">
                        File Ticket
                    </button>
                </div>
                <div id="ticketsContainer">
                    <!-- Rendered dynamically -->
                </div>
            </div>
        </div>
    </div>
    </div>
    <script src="detail.js"></script>
</body>

</html>
