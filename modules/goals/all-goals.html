<!-- modules/goals/all-goals.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../../session-check.js"></script>
    <link rel="stylesheet" href="../apps/styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <title>Goals Workspace Suite</title>
    <style>
        .goals-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 768px) {
            .goals-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .goals-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .accordion-card {
            padding: 12px !important;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }

        .accordion-card:hover {
            border-color: rgba(251, 113, 133, 0.4) !important;
            transform: translateY(-2px);
        }

        .infographics-bar {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            height: 8px;
            margin: 10px 0;
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
        }

        .infographics-fill {
            background: linear-gradient(90deg, #10b981, #34d399);
            height: 100%;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .goal-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid #4b5563;
            border-radius: 4px;
            margin-right: 12px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .goal-checkbox:checked {
            background: #10b981;
            border-color: #10b981;
        }

        .goal-checkbox:checked::after {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            color: white;
            font-size: 10px;
            display: block;
        }

        .modal {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: rgba(0, 0, 0, 0.75) !important;
            display: none;
            justify-content: center !important;
            align-items: center !important;
            z-index: 9999 !important;
            padding: 20px !important;
            box-sizing: border-box !important;
        }

        .modal.show {
            display: flex !important;
        }

        /* Updated constraints to support auto-height and prevent layout clipping */
        .modal-content {
            background: #0f172a !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            width: 100% !important;
            max-width: 480px !important;
            height: auto !important;
            max-height: 90vh !important;
            display: flex !important;
            flex-direction: column !important;
            padding: 20px !important;
            box-sizing: border-box !important;
            overflow: visible !important;
        }

        .modal-header {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
            padding-bottom: 8px !important;
            margin-bottom: 12px !important;
            flex-shrink: 0 !important;
        }

        .modal-body {
            flex: 1 !important;
            overflow: visible !important;
        }

        .goal-item-row {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 8px;
        }

        /* Dynamic Goal Items inside Modals */
        .goal-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .drag-handle {
            cursor: grab;
            color: #9ca3af;
            padding: 0 4px;
        }

        .goal-content {
            flex: 1;
            font-size: 0.85rem;
            color: white;
            word-break: break-word;
        }

        .goal-input {
            flex: 1;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-bottom: 0;
        }

        .goal-actions {
            display: flex;
            gap: 4px;
        }

        .goal-btn {
            background: transparent;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            width: auto;
            margin-bottom: 0;
            box-shadow: none;
        }

        .goal-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        /* App tag dropdown items container */
        .app-tag-item {
            padding: 6px 10px;
            font-size: 0.85rem;
            color: #cbd5e1;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.15s, color 0.15s;
            height: 32px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
        }

        /* Rich Text input simulator */
        .rte-input {
            width: 100%;
            min-height: 38px;
            box-sizing: border-box;
            padding: 8px 12px;
            border-radius: 10px;
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            white-space: pre-wrap;
            word-break: break-word;
            transition: all 0.25s ease;
        }

        .rte-input:focus {
            border-color: #fb7185;
            box-shadow: 0 0 0 3px rgba(251, 113, 133, 0.2);
            background-color: rgba(15, 23, 42, 0.8);
        }

        .rte-input:empty:before {
            content: attr(data-placeholder);
            color: #6b7280;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Top row with Back navigation link and Centered Title -->
        <div class="header-container"
            style="display: grid; grid-template-columns: 40px 1fr 40px; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
            <!-- Left Back Button -->
            <a href="index.html" class="back-link" title="Back to main dashboard"
                style="color: var(--text-secondary); font-size: 1.25rem; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; transition: color 0.2s; margin-bottom: 0;">
                <i class="fa-solid fa-arrow-left"></i>
            </a>

            <!-- Center App Title -->
            <h2 style="margin: 0 auto; border-bottom: none; padding-bottom: 0; font-size: 1.8rem;">
                Goals Workspace
            </h2>

            <!-- Far right Refresh Button -->
            <button class="refresh-btn" onclick="handleWorkspaceRefresh()" title="Refresh entries"
                style="background: none; border: none; cursor: pointer; color: #fb7185; padding: 0; width: 32px; height: 32px; box-shadow: none; font-size: 1.15rem; display: inline-flex; align-items: center; justify-content: center; opacity: 0.65; transition: opacity 0.2s, transform 0.2s; justify-self: end;"
                onmouseover="this.style.opacity='1'; this.style.transform='scale(1.1)'"
                onmouseout="this.style.opacity='0.65'; this.style.transform='scale(1)'">
                <i class="fa-solid fa-arrows-rotate"></i>
            </button>
        </div>

        <!-- Search input -->
        <div style="margin-bottom: 20px;">
            <div class="search-input-wrapper">
                <input type="text" id="searchWorkspace" placeholder="Search milestones, goals, or usernames..."
                    oninput="renderWorkspace()">
            </div>
        </div>

        <!-- Tabs & Dynamic Action Row -->
        <div
            style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); margin-bottom: 24px; flex-wrap: wrap; gap: 12px;">
            <div class="tabs-container"
                style="border-bottom: none; margin-bottom: 0; display: flex; flex-wrap: wrap; gap: 4px;">
                <button class="tab-btn active" onclick="switchWorkspaceTab('annual')">Annual</button>
                <button class="tab-btn" onclick="switchWorkspaceTab('quarterly')">Quarterly</button>
                <button class="tab-btn" onclick="switchWorkspaceTab('monthly')">Monthly</button>
                <button class="tab-btn" onclick="switchWorkspaceTab('weekly')">Weekly</button>
                <button class="tab-btn" onclick="switchWorkspaceTab('daily')">Daily</button>
            </div>

            <!-- Dynamic button aligned on the right of the tabs bar -->
            <button id="addGoalBtn" onclick="handleOpenUnifiedModal()"
                style="width: auto; padding: 10px 18px; font-size: 0.85rem; background: #fb7185; border-color: #fb7185; color: white; margin-bottom: 0;">
                <i class="fa-solid fa-plus"></i> New Annual Goal
            </button>
        </div>

        <!-- Tab Contents -->
        <div id="tab-annual" class="tab-content">
            <div id="annualGrid" class="goals-grid"></div>
        </div>

        <div id="tab-quarterly" class="tab-content" style="display: none;">
            <div id="quarterlyGrid" class="goals-grid"></div>
        </div>

        <div id="tab-monthly" class="tab-content" style="display: none;">
            <div id="monthlyGrid" class="goals-grid"></div>
        </div>

        <div id="tab-weekly" class="tab-content" style="display: none;">
            <div id="weeklyGrid" class="goals-grid"></div>
        </div>

        <div id="tab-daily" class="tab-content" style="display: none;">
            <div id="dailyGrid" class="goals-grid"></div>
        </div>
    </div>

    <!-- Unified Dynamic Modal for adding all goal types -->
    <div id="unifiedGoalModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="unifiedModalTitle" style="margin: 0 auto; color: #fb7185;">Set Goal</h3>
                <span class="close-btn" onclick="closeUnifiedModal()">&times;</span>
            </div>
            <div class="modal-body">
                <!-- High level objective label / title -->
                <div id="titleFieldContainer" style="display: none;">
                    <label id="titleFieldLabel" for="goalTitle"
                        style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px;">Objective
                        Title</label>
                    <input type="text" id="goalTitle" placeholder="e.g. Standard Core Architecture"
                        style="padding: 8px 12px; font-size: 0.85rem; margin-bottom: 14px;">
                </div>

                <!-- Label with Info Button -->
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                    <label id="itemsLabel"
                        style="font-size:0.85rem; color:#9ca3af; margin-bottom:0;">Commitments</label>
                    <button type="button" onclick="openValidationInfoModal()" title="View goal requirements"
                        style="background: none; border: none; cursor: pointer; color: #fb7185; padding: 0; width: auto; box-shadow: none; font-size: 0.95rem; display: inline-flex; align-items: center; opacity: 0.8; transition: opacity 0.2s, transform 0.2s;"
                        onmouseover="this.style.opacity='1'; this.style.transform='scale(1.15)'"
                        onmouseout="this.style.opacity='0.8'; this.style.transform='scale(1)'">
                        <i class="fa-solid fa-circle-info"></i>
                    </button>
                </div>

                <!-- Input area containing app-tag dropdown system wrapper -->
                <div style="display: flex; gap: 8px; margin-bottom: 12px; align-items: flex-start;">
                    <div style="position: relative; flex: 1; display: flex; flex-direction: column;">
                        <!-- REPLACED: Input replaced with contenteditable div for styling inline purple tags as you type -->
                        <div id="goalItemInput" class="rte-input" contenteditable="true"
                            data-placeholder="Add an item... (Type @ to tag an app)"></div>

                        <!-- Interactive App Tag autocomplete dropdown -->
                        <div id="appTagDropdown"
                            style="display: none; position: absolute; top: 100%; left: 0; width: 100%; background: #1e293b; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; z-index: 10001; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); padding: 8px; box-sizing: border-box; margin-top: 4px;">
                            <input type="text" id="appTagSearch" placeholder="Filter applications..." autocomplete="off"
                                style="padding: 6px 10px; font-size: 0.8rem; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: white; margin-bottom: 6px; border-radius: 4px; box-sizing: border-box; width: 100%;">
                            <div id="appTagList"
                                style="max-height: 112px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px;">
                                <!-- Options rendered dynamically -->
                            </div>
                        </div>
                    </div>

                    <button type="button" onclick="addGoalItemUI('modalItemsList', 'goalItemInput')"
                        style="width: auto; background: rgba(251, 113, 133, 0.1); border: 1px solid rgba(251, 113, 133, 0.3); color: #fb7185; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; margin-bottom: 0; box-shadow: none; height: 38px;">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>

                <ul id="modalItemsList"
                    style="list-style: none; padding: 0; margin: 0; min-height: 50px; max-height: 220px; overflow-y: auto;">
                </ul>

                <button onclick="saveUnifiedGoal()"
                    style="margin-top:20px; background: #fb7185; border-color: #fb7185; font-weight: 600; width: 100%;">
                    Commit Goal
                </button>
            </div>
        </div>
    </div>

    <!-- Requirements Info Modal -->
    <div id="validationInfoModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 400px !important;">
            <div class="modal-header">
                <h3 style="margin: 0 auto; display: flex; align-items: center; gap: 8px; color: #fb7185;">
                    <i class="fa-solid fa-circle-info"></i> Goal Requirements
                </h3>
                <span class="close-btn" onclick="closeValidationInfoModal()">&times;</span>
            </div>
            <div class="modal-body"
                style="font-size: 0.9rem; line-height: 1.6; color: #9ca3af; text-align: center; padding: 10px 0;">
                <p style="margin: 0 0 16px 0;">To ensure precise planning and tracking, entries committed to the
                    platform must align with the following rules:</p>
                <div
                    style="display: flex; flex-direction: column; gap: 10px; align-items: center; margin-bottom: 10px;">
                    <div style="display: flex; align-items: center; gap: 8px; color: white; font-weight: 600;">
                        <i class="fa-solid fa-circle-check" style="color: #fb7185;"></i>
                        <span>Minimum: 5 items</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px; color: white; font-weight: 600;">
                        <i class="fa-solid fa-circle-check" style="color: #fb7185;"></i>
                        <span>Maximum: 15 items</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Detailed View/Toggle Goals Modal -->
    <div id="detailsViewModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="detailsTitle" style="margin: 0 auto; color: #fb7185;">Goal Information</h3>
                <span class="close-btn" onclick="closeDetailsModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div id="detailsMeta" style="margin-bottom: 12px;"></div>
                <div id="detailsList" style="display:flex; flex-direction:column; gap:8px;"></div>
            </div>
        </div>
    </div>

    <script src="../../env-config.js"></script>
    <script type="module" src="../../firebase-init.js"></script>
    <script src="../../email-notify.js"></script>
    <script src="all-goals.js"></script>
</body>

</html>
