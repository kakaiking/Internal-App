<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../../session-check.js"></script>
    <link rel="stylesheet" href="../apps/styles.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Responsive Grid Layout for Shared Skills cards */
        #skillsContainer {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 640px) {
            #skillsContainer {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            #skillsContainer {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 5px Padding Constraint for Cards */
        .accordion-card {
            padding: 5px !important;
            border-radius: 8px;
        }

        /* Hover behavior for skill cards */
        .accordion-card {
            transition: border-color 0.2s, transform 0.15s;
        }

        .accordion-card:hover {
            border-color: rgba(251, 191, 36, 0.3) !important;
        }

        /* Modal Layout Fixes to Prevent Screen Cutoff */
        .modal {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: rgba(0, 0, 0, 0.75) !important;
            display: none;
            /* Managed by JS */
            justify-content: center !important;
            align-items: center !important;
            z-index: 9999 !important;
            padding: 20px !important;
            box-sizing: border-box !important;
        }

        .modal.show {
            display: flex !important;
        }

        .modal-content {
            background: #0f172a !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            width: 100% !important;
            max-width: 460px !important;
            max-height: calc(100vh - 120px) !important;
            /* Constrains height to clear floating navigation docks */
            display: flex !important;
            flex-direction: column !important;
            padding: 16px !important;
            box-sizing: border-box !important;
            overflow: hidden !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4) !important;
        }

        .modal-header {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
            padding-bottom: 8px !important;
            margin-bottom: 12px !important;
            flex-shrink: 0 !important;
        }

        .modal-body {
            flex: 1 !important;
            overflow-y: auto !important;
            /* Enables scrollbar internally when needed */
            padding-right: 4px !important;
            box-sizing: border-box !important;
        }

        /* Custom scrollbar for modal body scroll */
        .modal-body::-webkit-scrollbar {
            width: 6px;
        }

        .modal-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
        }

        .modal-body::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Top header row -->
        <div class="header-container"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
            <h2 style="margin: 0 auto; border-bottom: none; padding-bottom: 0; font-size: 1.8rem;">
                Skills
            </h2>
        </div>

        <!-- Search Bar & Actions -->
        <div class="header-actions" style="margin-bottom: 24px; display: flex; gap: 16px; align-items: center;">
            <div class="search-input-wrapper" style="flex: 1;">

                <input type="text" id="searchSkills"
                    placeholder="Search skill guides by title, content or contributor..." oninput="render()">
            </div>
            <!-- Leaderboard Trigger Button -->
            <button onclick="openSkillsLeaderboardModal()"
                style="width: auto; padding: 10px 18px; font-size: 0.9rem; background: #fbbf24; border-color: #fbbf24; color: #1e1b4b; font-weight: 600;"
                title="View Contributors">
                <i class="fa-solid fa-trophy"></i>
            </button>
            <button onclick="openSkillModal()"
                style="width: auto; padding: 10px 18px; font-size: 0.9rem; background: #fbbf24; border-color: #fbbf24; color: #1e1b4b; font-weight: 600;">
                Share Skill
            </button>
        </div>

        <div>
            <!-- Directory Panel -->
            <div>
                <h3 style="margin-bottom: 16px;"> All Skills</h3>
                <div id="skillsContainer" class="list-container" style="margin-bottom: 12px;"></div>

                <!-- Main Cards Pagination Container -->
                <div id="mainPagination"
                    style="display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 16px; font-size: 0.85rem; color: #9ca3af; font-weight: 500;">
                </div>
            </div>
        </div>
    </div>

    <!-- Contributors Leaderboard Modal -->
    <div id="skillsLeaderboardModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto; color:#fbbf24;"> Top Contributors</h3>
                <span class="close-btn" onclick="closeSkillsLeaderboardModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div id="skillsLeaderboard" style="display:flex; flex-direction:column; gap:8px;"></div>

                <!-- Leaderboard Pagination Container -->
                <div id="leaderboardPagination"
                    style="display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 20px; font-size: 0.85rem; color: #9ca3af; font-weight: 500;">
                </div>
            </div>
        </div>
    </div>

    <!-- Skill Detail Modal -->
    <div id="skillDetailModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="detailSkillTitle" style="margin: 0 auto; color:#fbbf24;">Skill Detail</h3>
                <span class="close-btn" onclick="closeSkillDetailModal()">&times;</span>
            </div>
            <div class="modal-body" style="display: flex; flex-direction: column; gap: 14px;">
                <div id="detailSkillMeta"
                    style="font-size: 0.85rem; color: #9ca3af; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">
                </div>
                <div id="detailSkillBody"
                    style="white-space: pre-line; color: #e5e7eb; line-height: 1.5; font-size: 0.95rem;"></div>
            </div>
        </div>
    </div>

    <!-- Edit Skill Modal -->
    <div id="editSkillModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto; color: #fbbf24;"><i class="fa-solid fa-pen"></i> Edit Shared Skill</h3>
                <span class="close-btn" onclick="closeEditSkillModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editSkillId">

                <label for="editSkillAuthor"
                    style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px;">Your Name</label>
                <input type="text" id="editSkillAuthor" placeholder="e.g. Alice" required
                    style="padding: 8px 12px; font-size: 0.85rem;">

                <label for="editSkillTitle"
                    style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:14px;">Skill
                    Title</label>
                <input type="text" id="editSkillTitle" placeholder="e.g. Clean Git Rebase Workflow" required
                    style="padding: 8px 12px; font-size: 0.85rem;">

                <label for="editSkillDesc"
                    style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:14px;">Guidance
                    Details</label>
                <textarea id="editSkillDesc" placeholder="Describe the skills, commands, or advice clearly..." required
                    style="min-height: 100px; padding: 8px 12px; font-size: 0.85rem;"></textarea>

                <button onclick="saveEditSkill()"
                    style="margin-top:20px; background: #fbbf24; border-color: #fbbf24; color: #1e1b4b; font-weight: 600; width: 100%;">
                    Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Share Skill Modal -->
    <div id="skillModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto;"> Share Skill</h3>
                <span class="close-btn" onclick="closeSkillModal()">&times;</span>
            </div>
            <div class="modal-body">
                <label for="contribName"
                    style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px;">Your Name</label>
                <input type="text" id="contribName" placeholder="e.g. Alice" required
                    style="padding: 8px 12px; font-size: 0.85rem;">

                <label for="skillTitle"
                    style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:14px;">Skill
                    Title</label>
                <input type="text" id="skillTitle" placeholder="e.g. Clean Git Rebase Workflow" required
                    style="padding: 8px 12px; font-size: 0.85rem;">

                <label for="skillDesc"
                    style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:14px;">Guidance
                    Details</label>
                <textarea id="skillDesc" placeholder="Describe the skills, commands, or advice clearly..." required
                    style="min-height: 100px; padding: 8px 12px; font-size: 0.85rem;"></textarea>

                <button onclick="addSkill()"
                    style="margin-top:20px; background: #fbbf24; border-color: #fbbf24; color: #1e1b4b; font-weight: 600; width: 100%;">
                    Publish Skill</button>
            </div>
        </div>
    </div>

    <script type="module" src="../../firebase-init.js"></script>
    <script src="app.js"></script>
</body>

</html>
