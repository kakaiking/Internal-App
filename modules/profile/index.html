<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/session-check.js"></script>
    <link rel="stylesheet" href="../apps/styles.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>User Profile & Team Directory</title>
    <style>
        /* Profile Module Custom Styles */
        .profile-header-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 24px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 24px;
        }

        .large-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff7a00, #ff5100);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(255, 122, 0, 0.25);
            border: 3px solid rgba(255, 255, 255, 0.1);
        }

        .profile-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        .profile-email {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .profile-meta-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.15);
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 12px;
            font-size: 0.92rem;
            color: var(--text-primary);
        }

        .profile-meta-item i {
            color: #ff7a00;
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        .profile-meta-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .member-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.35s ease-out;
        }

        .member-card:hover {
            border-color: rgba(255, 122, 0, 0.3);
            background: rgba(30, 41, 59, 0.55);
            box-shadow: 0 8px 30px rgba(255, 122, 0, 0.05);
            transform: translateY(-2px);
        }

        .member-card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .member-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ff7a00;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .member-info h4 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 600;
            color: white;
        }

        .member-info p {
            margin: 2px 0 0 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .member-bio {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin: 0;
            flex-grow: 1;
            font-style: italic;
        }

        .member-footer {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .member-dept {
            font-size: 0.75rem;
            background: rgba(255, 122, 0, 0.1);
            color: #ff7a00;
            padding: 2px 8px;
            border-radius: 100px;
            font-weight: 600;
        }

        /* Avatar Button Styling */
        .avatar-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #ff7a00;
            border: 2px solid rgba(255, 122, 0, 0.4);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            flex-shrink: 0;
            transition: transform 0.2s, border-color 0.2s;
        }

        .avatar-btn:hover {
            transform: scale(1.05);
            border-color: rgba(255, 122, 0, 0.8);
            box-shadow: 0 0 10px rgba(255, 122, 0, 0.3);
        }

        /* Modal specific scroll and layout */
        .modal {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: rgba(0, 0, 0, 0.75) !important;
            display: none;
            /* Managed by JS */
            justify-content: center !important;
            align-items: center !important;
            z-index: 9999 !important;
            padding: 20px !important;
            box-sizing: border-box !important;
        }

        .modal.show {
            display: flex !important;
        }

        .modal-content {
            background: #0f172a !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            width: 100% !important;
            max-width: 460px !important;
            max-height: calc(100vh - 120px) !important;
            /* Constrains height to clear floating navigation docks */
            display: flex !important;
            flex-direction: column !important;
            padding: 16px !important;
            box-sizing: border-box !important;
            overflow: hidden !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4) !important;
        }

        .modal-header {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
            padding-bottom: 8px !important;
            margin-bottom: 12px !important;
            flex-shrink: 0 !important;
        }

        .modal-body {
            flex: 1 !important;
            overflow-y: auto !important;
            /* Enables scrollbar internally when needed */
            padding-right: 4px !important;
            box-sizing: border-box !important;
        }

        /* Custom scrollbar for modal body scroll */
        .modal-body::-webkit-scrollbar {
            width: 6px;
        }

        .modal-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
        }

        .modal-body::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .modal-body label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .modal-body label.required::after {
            content: " *";
            color: var(--danger);
        }

        /* Read-only field styling */
        .readonly-input {
            background-color: rgba(255, 255, 255, 0.03) !important;
            border-color: rgba(255, 255, 255, 0.05) !important;
            color: var(--text-secondary) !important;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Top header row -->
        <div class="header-container"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
            <h2 style="margin: 0 auto; border-bottom: none; padding-bottom: 0; font-size: 1.8rem;">
                Profiles
            </h2>
        </div>

        <!-- Search Bar & Actions -->
        <div class="header-actions" style="margin-bottom: 24px; display: flex; gap: 16px; align-items: center;">
            <div class="search-input-wrapper" style="flex: 1;">
                
                <input type="text" id="searchTeammates"
                    placeholder="Search teammate profiles by name, role, department or bio..."
                    oninput="renderTeammates()">
            </div>
            <!-- Avatar Button opens myProfileModal -->
            <button onclick="openMyProfileModal()" class="avatar-btn" id="myProfileButton" title="My Profile">
                
            </button>
        </div>

        <div>
            <!-- Directory Panel -->
            <div>
                <h3 style="margin-bottom: 16px;"> Teammates Directory</h3>
                <div id="teammatesList" class="team-grid" style="margin-bottom: 12px;"></div>
            </div>
        </div>
    </div>

    <!-- My Profile Modal -->
    <div id="myProfileModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto; color: #ff7a00;"> My Profile</h3>
                <span class="close-btn" onclick="closeMyProfileModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="profile-header-card" style="margin-bottom: 20px;">
                    <div class="large-avatar" id="myAvatar">U</div>
                    <div class="profile-name" id="myName">Loading...</div>
                    <div class="profile-email" id="myEmail">Loading...</div>
                </div>

                <div>
                    <div class="profile-meta-label">Designated Role</div>
                    <div class="profile-meta-item">
                        
                        <span id="myRole">Not specified</span>
                    </div>

                    <div class="profile-meta-label">Team Department</div>
                    <div class="profile-meta-item">
                        
                        <span id="myDept">Not specified</span>
                    </div>

                    <div class="profile-meta-label">Professional Bio</div>
                    <div class="profile-meta-item" style="align-items: flex-start;">
                        
                        <span id="myBio" style="font-style: italic; line-height: 1.4;">No bio provided. Say something
                            about yourself!</span>
                    </div>
                </div>

                <div style="display: flex; gap: 12px; margin-top: 24px;">
                    <button onclick="openEditProfileModal()"> Edit Profile</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editProfileModal" class="modal" style="display: none;">
        <form id="editProfileForm" onsubmit="saveProfileEdit(event)" class="modal-content">
            <div class="modal-header">
                <h3> Edit Profile Details</h3>
                <span class="close-btn" onclick="closeEditProfileModal()">&times;</span>
            </div>
            <div class="modal-body">
                <label class="required" for="editName">Full Name</label>
                <input type="text" id="editName" placeholder="e.g. Jane Doe" required>

                <label for="editEmail">Email Address (Locked)</label>
                <input type="email" id="editEmail" class="readonly-input" readonly>

                <label for="editRole">Designated Role</label>
                <input type="text" id="editRole" placeholder="e.g. Lead Security Architect">

                <label for="editDept">Department</label>
                <input type="text" id="editDept" placeholder="e.g. Platform Engineering">

                <label for="editBio">Professional Bio</label>
                <textarea id="editBio"
                    placeholder="Tell the team about yourself, skills, or what you work on..."></textarea>

                <button type="submit" style="margin-top: 16px;"> Save
                    Profile</button>
            </div>
        </form>
    </div>

    <script type="module" src="../../firebase-init.js"></script>
    <script src="app.js"></script>
</body>

</html>
