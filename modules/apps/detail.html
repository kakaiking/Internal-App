<!-- modules/apps/detail.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../../session-check.js"></script>
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome Icons -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <title>App Details</title>
    <script src="../../env-config.js"></script>
    <script type="module" src="../../firebase-init.js"></script>
</head>

<body>
    <div class="container">
        <!-- Top header row with back button, centered title, and far right refresh button -->
        <div class="header-container"
            style="display: grid; grid-template-columns: 40px 1fr 40px; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
            <!-- Left Back Button -->
            <a href="index.html" class="back-link" title="Back to directory"
                style="color: var(--text-secondary); font-size: 1.25rem; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; transition: color 0.2s; margin-bottom: 0;">
                <i class="fa-solid fa-arrow-left"></i>
            </a>

            <!-- Center App Title -->
            <h2 id="appNameHeader"
                style="margin: 0 auto; border-bottom: none; padding-bottom: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 10px;">
                Loading...
            </h2>

            <!-- Far right Refresh Button -->
            <button class="refresh-btn" onclick="handleRefreshDetail()" title="Refresh app details"
                style="background: none; border: none; cursor: pointer; color: #6366f1; padding: 0; width: 32px; height: 32px; box-shadow: none; font-size: 1.15rem; display: inline-flex; align-items: center; justify-content: center; opacity: 0.65; transition: opacity 0.2s, transform 0.2s; justify-self: end;"
                onmouseover="this.style.opacity='1'; this.style.transform='scale(1.1)'"
                onmouseout="this.style.opacity='0.65'; this.style.transform='scale(1)'">
                <i class="fa-solid fa-arrows-rotate"></i>
            </button>
        </div>

        <!-- Tabs Container -->
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchDetailTab('description')">
                Description
            </button>
            <!-- ADDED: Goals tab button inserted dynamically -->
            <button class="tab-btn" onclick="switchDetailTab('goals')">
                Goals
            </button>
            <button class="tab-btn" onclick="switchDetailTab('changelogs')">
                Changelogs
            </button>
            <button class="tab-btn" onclick="switchDetailTab('tickets')">
                Tickets
            </button>
        </div>
        <!-- Tab Contents -->
        <div id="tab-description" class="tab-content">
            <div class="card">
                <div id="appDescriptionText" style="line-height: 1.6; color: #cbd5e1; font-size: 1rem;"></div>
            </div>
        </div>

        <!-- ADDED: Goals tab panel wrapper container -->
        <div id="tab-goals" class="tab-content" style="display: none;">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h4 style="margin: 0; color: white;">
                        Associated Goals
                    </h4>
                    <button class="secondary-btn"
                        style="padding: 6px 12px; font-size: 0.85rem; width: auto; border-radius: 8px;"
                        onclick="handleRefreshAssociatedGoals()">
                        Refresh
                    </button>
                </div>
                <div id="associatedGoalsContainer">
                    <!-- Rendered dynamically -->
                </div>
            </div>
        </div>

        <div id="tab-changelogs" class="tab-content" style="display: none;">
            <div class="card" id="githubCommitsCard">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h4 style="margin: 0; color: white;">
                        Recent Commits
                    </h4>
                    <button class="secondary-btn"
                        style="padding: 6px 12px; font-size: 0.85rem; width: auto; border-radius: 8px;"
                        onclick="handleRefreshCommits()">
                        Refresh
                    </button>
                </div>
                <div id="githubCommitsContainer">
                    <!-- Rendered dynamically -->
                </div>
            </div>
        </div>
        <div id="tab-tickets" class="tab-content" style="display: none;">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h4 style="margin: 0; color: white;"> Support Tickets</h4>
                    <button class="secondary-btn"
                        style="padding: 6px 12px; font-size: 0.85rem; width: auto; border-radius: 8px;"
                        onclick="handleFileTicket()">
                        File Ticket
                    </button>
                </div>
                <div id="ticketsContainer">
                    <!-- Rendered dynamically -->
                </div>
            </div>
        </div>
    </div>
    <script src="detail.js"></script>
</body>

</html>
