<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../apps/styles.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Responsive Grid Layout for Procedures cards */
        #proceduresList {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        @media (min-width: 640px) {
            #proceduresList {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (min-width: 1024px) {
            #proceduresList {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 5px Padding Constraint for Cards */
        .accordion-card {
            padding: 5px !important;
            border-radius: 8px;
        }

        /* Hover behavior for procedure cards */
        .accordion-card {
            transition: border-color 0.2s, transform 0.15s;
        }
        .accordion-card:hover {
            border-color: rgba(167, 139, 250, 0.3) !important;
        }

        /* Modal Layout Fixes to Prevent Screen Cutoff */
        .modal {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: rgba(0, 0, 0, 0.75) !important;
            display: none; /* Managed by JS */
            justify-content: center !important;
            align-items: center !important;
            z-index: 9999 !important;
            padding: 20px !important;
            box-sizing: border-box !important;
        }

        .modal.show {
            display: flex !important;
        }

        .modal-content {
            background: #0f172a !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            width: 100% !important;
            max-width: 460px !important;
            max-height: calc(100vh - 120px) !important; /* Constrains height to clear floating navigation docks */
            display: flex !important;
            flex-direction: column !important;
            padding: 16px !important;
            box-sizing: border-box !important;
            overflow: hidden !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4) !important;
        }

        .modal-header {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
            padding-bottom: 8px !important;
            margin-bottom: 12px !important;
            flex-shrink: 0 !important;
        }

        .modal-body {
            flex: 1 !important;
            overflow-y: auto !important; /* Enables scrollbar internally when needed */
            padding-right: 4px !important;
            box-sizing: border-box !important;
        }

        /* Custom scrollbar for modal body scroll */
        .modal-body::-webkit-scrollbar {
            width: 6px;
        }
        .modal-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .modal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
        }
        .modal-body::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top header row -->
        <div class="header-container"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
            <h2 style="margin: 0 auto; border-bottom: none; padding-bottom: 0; font-size: 1.8rem;">
                <i class="fa-solid fa-scroll" style="color: #a78bfa;"></i> Procedural Guide Library
            </h2>
        </div>

        <!-- Search Bar & Actions -->
        <div class="header-actions" style="margin-bottom: 24px; display: flex; gap: 16px; align-items: center;">
            <div class="search-input-wrapper" style="flex: 1;">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchProcedures" placeholder="Search procedures by title or content steps..." oninput="render()">
            </div>
            <!-- Leaderboard Trigger Button -->
            <button onclick="openProceduresLeaderboardModal()" style="width: auto; padding: 10px 18px; font-size: 0.9rem; background: #a78bfa; border-color: #a78bfa; color: white;" title="View Contributors">
                <i class="fa-solid fa-arrow-down-wide-short"></i>
            </button>
            <button onclick="openProcedureModal()" style="width: auto; padding: 10px 18px; font-size: 0.9rem; background: #a78bfa; border-color: #a78bfa; color: white;">
                <i class="fa-solid fa-plus-circle"></i> Publish Guide
            </button>
        </div>

        <div>
            <!-- Directory Panel -->
            <div>
                <h3 style="margin-bottom: 16px;"><i class="fa-solid fa-book-bookmark"></i> Runbooks & Checklists</h3>
                <div id="proceduresList" class="list-container" style="margin-bottom: 12px;"></div>
                
                <!-- Main Cards Pagination Container -->
                <div id="mainPagination" style="display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 16px; font-size: 0.85rem; color: #9ca3af; font-weight: 500;"></div>
            </div>
        </div>
    </div>

    <!-- Contributors Leaderboard Modal -->
    <div id="proceduresLeaderboardModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto; color:#a78bfa;"><i class="fa-solid fa-award"></i> Top Contributors</h3>
                <span class="close-btn" onclick="closeProceduresLeaderboardModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div id="proceduresLeaderboard" style="display:flex; flex-direction:column; gap:8px;"></div>
                
                <!-- Leaderboard Pagination Container -->
                <div id="leaderboardPagination" style="display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 20px; font-size: 0.85rem; color: #9ca3af; font-weight: 500;"></div>
            </div>
        </div>
    </div>

    <!-- Procedure Detail Modal -->
    <div id="procedureDetailModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="detailProcedureTitle" style="margin: 0 auto; color:#a78bfa;"><i class="fa-solid fa-terminal"></i> Runbook Detail</h3>
                <span class="close-btn" onclick="closeProcedureDetailModal()">&times;</span>
            </div>
            <div class="modal-body" style="display: flex; flex-direction: column; gap: 14px;">
                <div id="detailProcedureMeta" style="font-size: 0.85rem; color: #9ca3af; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;"></div>
                
                <p style="font-size:0.8rem; color:#6b7280; font-weight:600; margin: 4px 0; text-transform:uppercase; letter-spacing:0.5px;">
                    <i class="fa-solid fa-list-check"></i> Checklist Runner (Progress Helper)
                </p>
                
                <div id="detailProcedureSteps" style="display:flex; flex-direction:column; gap:6px; background:rgba(0,0,0,0.2); padding:14px; border-radius:10px; border:1px solid rgba(255,255,255,0.03);"></div>
            </div>
        </div>
    </div>

    <!-- Edit Procedure Modal -->
    <div id="editProcedureModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto; color: #a78bfa;"><i class="fa-solid fa-pen"></i> Edit Guide Runbook</h3>
                <span class="close-btn" onclick="closeEditProcedureModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editProcId">
                
                <label for="editProcAuthor" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px;">Your Name</label>
                <input type="text" id="editProcAuthor" placeholder="e.g. Alice" required style="padding: 8px 12px; font-size: 0.85rem;">
                
                <label for="editProcTitle" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:14px;">Guide Title</label>
                <input type="text" id="editProcTitle" placeholder="e.g. Setting up a new staging workspace" required style="padding: 8px 12px; font-size: 0.85rem;">
                
                <label for="editProcSteps" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:14px;">Execution Steps (One per line)</label>
                <textarea id="editProcSteps" placeholder="Step 1: Check out main branch&#10;Step 2: Pull origin updates&#10;Step 3: Run migrations..." required style="min-height: 100px; padding: 8px 12px; font-size: 0.85rem;"></textarea>
                
                <button onclick="saveEditProcedure()" style="margin-top:20px; background: #a78bfa; border-color: #a78bfa; color: white; font-weight: 600; width: 100%;"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Publish Procedure Modal -->
    <div id="procedureModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto; color: #a78bfa;"><i class="fa-solid fa-file-signature"></i> Publish Guide Runbook</h3>
                <span class="close-btn" onclick="closeProcedureModal()">&times;</span>
            </div>
            <div class="modal-body">
                <label for="procAuthor" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px;">Your Name</label>
                <input type="text" id="procAuthor" placeholder="e.g. Alice" required style="padding: 8px 12px; font-size: 0.85rem;">
                
                <label for="procTitle" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:14px;">Guide Title</label>
                <input type="text" id="procTitle" placeholder="e.g. Setting up a new staging workspace" required style="padding: 8px 12px; font-size: 0.85rem;">
                
                <label for="procSteps" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:14px;">Execution Steps (One per line)</label>
                <textarea id="procSteps" placeholder="Step 1: Check out main branch&#10;Step 2: Pull origin updates&#10;Step 3: Run migrations..." required style="min-height: 100px; padding: 8px 12px; font-size: 0.85rem;"></textarea>
                
                <button onclick="addProcedure()" style="margin-top:20px; background: #a78bfa; border-color: #a78bfa; color: white; font-weight: 600; width: 100%;"><i class="fa-solid fa-cloud-arrow-up"></i> Publish Standard Procedure</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
