<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../apps/styles.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Top header row -->
        <div class="header-container"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
            <h2 style="margin: 0 auto; border-bottom: none; padding-bottom: 0; font-size: 1.8rem;">
                <i class="fa-solid fa-scroll" style="color: #a78bfa;"></i> Procedural Guide Library
            </h2>
        </div>

        <!-- Search Bar & Action -->
        <div class="header-actions" style="margin-bottom: 24px; display: flex; gap: 16px; align-items: center;">
            <div class="search-input-wrapper" style="flex: 1;">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchProcedures" placeholder="Search procedures by title or content steps..." oninput="render()">
            </div>
            
            <!-- Category Filter -->
            <select id="filterCategory" onchange="render()" style="width: 180px; margin-bottom: 0; padding: 10px 12px; font-size: 0.85rem; height: auto;">
                <option value="All">All Categories</option>
                <option value="App Creation">App Creation</option>
                <option value="Git Operations">Git Push / Branching</option>
                <option value="AI Prompt Engineering">AI Prompting Guides</option>
                <option value="Web Hosting / CI/CD">Hosting Standards</option>
            </select>
            
            <button onclick="openProcedureModal()" style="width: auto; padding: 10px 18px; font-size: 0.9rem; background: #a78bfa; border-color: #a78bfa; color: white;">
                <i class="fa-solid fa-plus-circle"></i> Publish Guide
            </button>
        </div>

        <div style="display: flex; flex-direction: column; gap: 24px;">
            <!-- Runbooks List -->
            <div>
                <h3 style="margin-bottom: 16px;"><i class="fa-solid fa-book-bookmark"></i> Runbooks & Checklists</h3>
                <div id="proceduresList" class="list-container" style="display: flex; flex-direction: column; gap: 16px;"></div>
            </div>
        </div>
    </div>

    <!-- Publish Procedure Modal -->
    <div id="procedureModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto; color: #a78bfa;"><i class="fa-solid fa-file-signature"></i> Publish Guide Runbook</h3>
                <span class="close-btn" onclick="closeProcedureModal()">&times;</span>
            </div>
            <div class="modal-body">
                <label for="procCat" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px;">Category</label>
                <select id="procCat">
                    <option value="App Creation">App Creation</option>
                    <option value="Git Operations">Git Push / Branching</option>
                    <option value="AI Prompt Engineering">AI Prompting Guides</option>
                    <option value="Web Hosting / CI/CD">Hosting Standards</option>
                </select>
                
                <label for="procTitle" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:14px;">Guide Title</label>
                <input type="text" id="procTitle" placeholder="e.g. Setting up a new staging workspace" required>
                
                <label for="procSteps" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:14px;">Execution Steps (One per line)</label>
                <textarea id="procSteps" placeholder="Step 1: Check out main branch&#10;Step 2: Pull origin updates&#10;Step 3: Run migrations..." required style="min-height: 120px;"></textarea>
                
                <button onclick="addProcedure()" style="margin-top:20px; background: #a78bfa; border-color: #a78bfa; font-weight: 600;"><i class="fa-solid fa-cloud-arrow-up"></i> Publish Standard Procedure</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
