<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../apps/styles.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Top header row -->
        <div class="header-container"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
            <h2 style="margin: 0 auto; border-bottom: none; padding-bottom: 0; font-size: 1.8rem;">
                <i class="fa-solid fa-calendar-days" style="color: #f472b6;"></i> Central Event Calendar
            </h2>
        </div>

        <!-- Search Bar & Action -->
        <div class="header-actions" style="margin-bottom: 24px; display: flex; gap: 16px; align-items: center;">
            <div class="search-input-wrapper" style="flex: 1;">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchEvents" placeholder="Search events by title, location or date..." oninput="renderEvents()">
            </div>
            
            <!-- Filter Dropdown -->
            <select id="filterType" onchange="renderEvents()" style="width: 140px; margin-bottom: 0; padding: 10px 12px; font-size: 0.85rem; height: auto;">
                <option value="All">All Types</option>
                <option value="Virtual">Virtual</option>
                <option value="Physical">Physical</option>
            </select>
            
            <button onclick="openCalendarModal()" style="width: auto; padding: 10px 18px; font-size: 0.9rem; background: #f472b6; border-color: #f472b6; color: white;">
                <i class="fa-solid fa-plus-circle"></i> Add Event
            </button>
        </div>

        <div style="display: flex; flex-direction: column; gap: 24px;">
            <!-- Upcoming Schedule Panel -->
            <div>
                <h3 style="margin-bottom: 16px;"><i class="fa-solid fa-list-ul"></i> Upcoming Schedule</h3>
                <div id="eventCalendar" class="list-container" style="display: flex; flex-direction: column; gap: 16px;"></div>
            </div>
        </div>
    </div>

    <!-- Calendar Event Modal -->
    <div id="calendarModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto; color: #f472b6;"><i class="fa-solid fa-calendar-plus"></i> Add New Event</h3>
                <span class="close-btn" onclick="closeCalendarModal()">&times;</span>
            </div>
            <div class="modal-body">
                <label for="evTitle" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px;">Event Name</label>
                <input type="text" id="evTitle" placeholder="e.g. Q3 All Hands Sync" required>
                
                <label for="evDate" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top: 14px;">Event Date</label>
                <input type="date" id="evDate" required>
                
                <label for="evType" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top: 14px;">Event Type</label>
                <select id="evType">
                    <option value="Virtual">Virtual Event</option>
                    <option value="Physical">Physical Event</option>
                </select>
                
                <label for="evLoc" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top: 14px;">Location / Virtual Link</label>
                <input type="text" id="evLoc" placeholder="e.g. Google Meet URL or conference room name" required>
                
                <button onclick="addEvent()" style="margin-top:20px; background: #f472b6; border-color: #f472b6; font-weight: 600;"><i class="fa-solid fa-circle-plus"></i> Add to Calendar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
