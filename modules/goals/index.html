<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../../session-check.js"></script>
    <link rel="stylesheet" href="../apps/styles.css">
    <!-- Font Awesome Icons -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        /* Responsive Grid Layout for Commitments cards */
        #goalsHistory {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 640px) {
            #goalsHistory {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            #goalsHistory {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 5px Padding Constraint for Cards */
        .accordion-card {
            padding: 5px !important;
            border-radius: 8px;
        }

        .infographics-bar {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            height: 10px;
            margin: 12px 0;
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
        }

        .infographics-fill {
            background: linear-gradient(90deg, #10b981, #34d399);
            height: 100%;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .goal-item-row {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

        .goal-item-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .goal-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid #4b5563;
            border-radius: 4px;
            margin-right: 12px;
            margin-bottom: 0;
            /* Override default input margin */
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .goal-checkbox:checked {
            background: #10b981;
            border-color: #10b981;
        }

        .goal-checkbox:checked::after {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            color: white;
            font-size: 10px;
            display: block;
        }

        /* Hover behavior for commitment cards */
        .accordion-card {
            transition: border-color 0.2s, transform 0.15s;
        }

        .accordion-card:hover {
            border-color: rgba(251, 113, 133, 0.3) !important;
        }

        /* Modal Layout Fixes to Prevent Screen Cutoff */
        .modal {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: rgba(0, 0, 0, 0.75) !important;
            display: none;
            /* Managed by JS */
            justify-content: center !important;
            align-items: center !important;
            z-index: 9999 !important;
            padding: 20px !important;
            box-sizing: border-box !important;
        }

        .modal.show {
            display: flex !important;
        }

        .modal-content {
            background: #0f172a !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            width: 100% !important;
            max-width: 460px !important;
            max-height: calc(100vh - 120px) !important;
            /* Constrains height to clear floating navigation docks */
            display: flex !important;
            flex-direction: column !important;
            padding: 16px !important;
            box-sizing: border-box !important;
            overflow: hidden !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4) !important;
        }

        .modal-header {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
            padding-bottom: 8px !important;
            margin-bottom: 12px !important;
            flex-shrink: 0 !important;
        }

        .modal-body {
            flex: 1 !important;
            overflow-y: auto !important;
            /* Enables scrollbar internally when needed */
            padding-right: 4px !important;
            box-sizing: border-box !important;
        }

        /* Custom scrollbar for modal body scroll */
        .modal-body::-webkit-scrollbar {
            width: 6px;
        }

        .modal-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
        }

        .modal-body::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Top header row -->
        <div class="header-container"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
            <h2 style="margin: 0 auto; border-bottom: none; padding-bottom: 0; font-size: 1.8rem;">
                Goals
            </h2>
        </div>

        <!-- Search Bar & Actions -->
        <div class="header-actions" style="margin-bottom: 24px; display: flex; gap: 16px; align-items: center;">
            <div class="search-input-wrapper" style="flex: 1;">

                <input type="text" id="searchGoals" placeholder="Search commitments by user, goals or week..."
                    oninput="render()">
            </div>
            <!-- Leaderboard Trigger Button -->
            <button onclick="openLeaderboardModal()"
                style="width: auto; padding: 10px 18px; font-size: 0.9rem; background: #fb7185; border-color: #fb7185; color: white;"
                title="View Leaderboard">
                <i class="fa-solid fa-trophy"></i>
            </button>
            <button onclick="openGoalModal()"
                style="width: auto; padding: 10px 18px; font-size: 0.9rem; background: #fb7185; border-color: #fb7185; color: white;">
                New Goals
            </button>
        </div>

        <div>
            <!-- Commitments Panel -->
            <div>
                <h3 style="margin-bottom: 16px;"> All Goals</h3>
                <div id="goalsHistory" class="list-container" style="margin-bottom: 12px;"></div>

                <!-- Main Cards Pagination Container -->
                <div id="mainPagination"
                    style="display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 16px; font-size: 0.85rem; color: #9ca3af; font-weight: 500;">
                </div>
            </div>
        </div>
    </div>

    <!-- Leaderboard Modal -->
    <div id="leaderboardModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto; color:#fb7185;"> Leaderboard</h3>
                <span class="close-btn" onclick="closeLeaderboardModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div id="leaderboard" style="display:flex; flex-direction:column; gap:8px;"></div>

                <!-- Leaderboard Pagination Container -->
                <div id="leaderboardPagination"
                    style="display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 20px; font-size: 0.85rem; color: #9ca3af; font-weight: 500;">
                </div>
            </div>
        </div>
    </div>

    <!-- View Goals Modal -->
    <div id="goalsViewModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="goalsViewTitle" style="margin: 0 auto; color:#fb7185;"> Weekly Goals</h3>
                <span class="close-btn" onclick="closeGoalsViewModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div id="goalsViewMeta" style="margin-bottom: 12px;"></div>
                <div id="goalsViewList" style="display:flex; flex-direction:column; gap:8px;"></div>
            </div>
        </div>
    </div>

    <!-- Set Weekly Goals Modal -->
    <div id="goalModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto;"> Set Weekly Goals</h3>
                <span class="close-btn" onclick="closeGoalModal()">&times;</span>
            </div>
            <div class="modal-body">
                <label for="userId" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px;">Your
                    Name / Username</label>
                <input type="text" id="userId" placeholder="e.g. Alice" required>

                <span
                    style="font-size:0.85rem; font-weight:600; color:#cbd5e1; display:block; margin-bottom:10px; margin-top: 14px;">
                    Enter Exactly 5 Goals for the Week:
                </span>

                <div style="display:flex; flex-direction:column; gap:6px;">
                    <input type="text" class="g-item" placeholder="Goal #1" required
                        style="padding: 8px 12px; font-size: 0.85rem;">
                    <input type="text" class="g-item" placeholder="Goal #2" required
                        style="padding: 8px 12px; font-size: 0.85rem;">
                    <input type="text" class="g-item" placeholder="Goal #3" required
                        style="padding: 8px 12px; font-size: 0.85rem;">
                    <input type="text" class="g-item" placeholder="Goal #4" required
                        style="padding: 8px 12px; font-size: 0.85rem;">
                    <input type="text" class="g-item" placeholder="Goal #5" required
                        style="padding: 8px 12px; font-size: 0.85rem;">
                </div>

                <button onclick="saveWeeklyGoals()"
                    style="margin-top:20px; background: #fb7185; border-color: #fb7185; font-weight: 600; width: 100%;">
                    Commit Goals</button>
            </div>
        </div>
    </div>

    <script type="module" src="../../firebase-init.js"></script>
    <script src="app.js"></script>
</body>

</html>
