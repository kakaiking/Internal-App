<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../apps/styles.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Top header row -->
        <div class="header-container"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
            <h2 style="margin: 0 auto; border-bottom: none; padding-bottom: 0; font-size: 1.8rem;">
                <i class="fa-solid fa-key" style="color: #34d399;"></i> Encrypted Messaging Tunnel
            </h2>
        </div>

        <!-- Search Bar & Action -->
        <div class="header-actions" style="margin-bottom: 24px; display: flex; gap: 16px;">
            <div class="search-input-wrapper" style="flex: 1;">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchMessages" placeholder="Search stream by raw data, timestamp or decrypted text..." oninput="renderMessages()">
            </div>
            <button onclick="openMessageModal()" style="width: auto; padding: 10px 18px; font-size: 0.9rem; background: #34d399; border-color: #34d399; color: #111827; font-weight: 600;">
                <i class="fa-solid fa-plus-circle"></i> Transmit Message
            </button>
        </div>

        <div style="display: flex; flex-direction: column; gap: 24px;">
            <!-- Messages Stream Panel -->
            <div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h3 style="margin: 0;"><i class="fa-solid fa-network-wired"></i> Database Message Stream</h3>
                    <button class="secondary-btn danger-btn" style="padding: 6px 12px; font-size: 0.8rem; width: auto; border-radius: 8px; margin-bottom: 0;" onclick="clearAllMessages()">
                        <i class="fa-solid fa-trash-can"></i> Clear Stream
                    </button>
                </div>
                
                <!-- Decrypt Key Bar -->
                <div style="background: rgba(52, 211, 153, 0.05); border: 1px solid rgba(52, 211, 153, 0.15); padding: 16px; border-radius: 12px; margin-bottom: 20px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <span style="font-size:0.85rem; font-weight:600; color:#34d399;">
                            <i class="fa-solid fa-unlock-keyhole"></i> Real-time Decryption Feed
                        </span>
                        <span id="decryptionStatus" class="badge danger"><i class="fa-solid fa-lock"></i> Locked</span>
                    </div>
                    <input type="text" id="decryptKey" placeholder="Type decryption key to unlock content..." oninput="onDecryptKeyInput()" style="margin-bottom:0; border-color: rgba(52, 211, 153, 0.3);">
                </div>

                <div id="msgStream" class="list-container" style="display: flex; flex-direction: column; gap: 16px;"></div>
            </div>
        </div>
    </div>

    <!-- Encryption Modal -->
    <div id="messageModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto; color: #34d399;"><i class="fa-solid fa-lock"></i> Send Encrypted Feed</h3>
                <span class="close-btn" onclick="closeMessageModal()">&times;</span>
            </div>
            <div class="modal-body">
                <label for="sharedKey" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px;">Secret Encryption Key</label>
                <input type="password" id="sharedKey" placeholder="Enter pre-shared secret..." required>
                
                <label for="plainMsg" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top: 14px;">Message Content</label>
                <textarea id="plainMsg" placeholder="Type plain text message to encrypt..." required style="min-height: 120px;"></textarea>
                
                <button onclick="sendMessage()" style="margin-top:20px; background: #34d399; border-color: #34d399; color: #111827; font-weight: 600;"><i class="fa-solid fa-user-shield"></i> Encrypt & Transmit</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
