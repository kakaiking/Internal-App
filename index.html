<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackstreetBoys Internal Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <!-- Session Check Utility -->
    <script src="env-config.js"></script>
    <script type="module" src="firebase-init.js"></script>
    <script src="session-check.js"></script>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Animated background glowing circles -->
    <div class="glow-bg">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <!-- Frosted Top Header -->
    <header class="active-bar">
        <div class="logo">
            <span class="logo-text">HACKSTREETBOYS<span class="logo-sub">LTD</span></span>
        </div>
        <div style="display: flex; align-items: center; gap: 32px;">
            <div class="active-list" id="activeList">
            </div>
            <button onclick="handleLogout()" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 8px; width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s ease;" title="Log out" onmouseover="this.style.background='rgba(239, 68, 68, 0.2)'; this.style.transform='scale(1.05)';" onmouseout="this.style.background='rgba(239, 68, 68, 0.1)'; this.style.transform='scale(1)';">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="content-viewport">
        <iframe id="moduleFrame" name="moduleFrame" src="" frameborder="0"></iframe>
        
        <!-- Welcome Screen & Dashboard -->
        <div id="welcomeScreen" class="welcome-screen">
            <div class="welcome-header">
                <h1 id="greeting">Welcome Back, Team</h1>
            </div>

            <!-- Dashboard Stats Grid -->
            <div class="dashboard-grid">
                <!-- App Registry Quick Stats -->
                <div class="dash-card" onclick="loadModule('apps', 'Apps Module')">
                    <div class="card-icon apps-color"><i class="fa-solid fa-layer-group"></i></div>
                    <div class="card-info">
                        <span class="card-value" id="statApps">-</span>
                        <span class="card-title">Apps</span>
                    </div>
                </div>

                <!-- Meetings Quick Stats -->
                <div class="dash-card" onclick="loadModule('meetings', 'Meetings')">
                    <div class="card-icon meetings-color"><i class="fa-solid fa-video"></i></div>
                    <div class="card-info">
                        <span class="card-value" id="statMeetings">-</span>
                        <span class="card-title">Meetings</span>
                    </div>
                </div>

                <!-- Messages Quick Stats -->
                <div class="dash-card" onclick="loadModule('messages', 'Messages')">
                    <div class="card-icon messages-color"><i class="fa-solid fa-shield-halved"></i></div>
                    <div class="card-info">
                        <span class="card-value" id="statMessages">-</span>
                        <span class="card-title">Secure Messages</span>
                    </div>
                </div>

                <!-- Calendar Quick Stats -->
                <div class="dash-card" onclick="loadModule('calendar', 'Calendar')">
                    <div class="card-icon calendar-color"><i class="fa-regular fa-calendar"></i></div>
                    <div class="card-info">
                        <span class="card-value" id="statCalendar">-</span>
                        <span class="card-title">Events</span>
                    </div>
                </div>

                <!-- Goals Quick Stats -->
                <div class="dash-card" onclick="loadModule('goals', 'Weekly Goals')">
                    <div class="card-icon goals-color"><i class="fa-solid fa-bullseye"></i></div>
                    <div class="card-info">
                        <span class="card-value" id="statGoals">-</span>
                        <span class="card-title">Goals</span>
                    </div>
                </div>

                <!-- Skills Quick Stats -->
                <div class="dash-card" onclick="loadModule('skills', 'Skills')">
                    <div class="card-icon skills-color"><i class="fa-solid fa-bolt"></i></div>
                    <div class="card-info">
                        <span class="card-value" id="statSkills">-</span>
                        <span class="card-title">Skills</span>
                    </div>
                </div>

                <!-- Procedures Quick Stats -->
                <div class="dash-card" onclick="loadModule('procedures', 'Procedures')">
                    <div class="card-icon procedures-color"><i class="fa-solid fa-list-check"></i></div>
                    <div class="card-info">
                        <span class="card-value" id="statProcedures">-</span>
                        <span class="card-title">Procedures</span>
                    </div>
                </div>

                <!-- Glossary Quick Stats -->
                <div class="dash-card" onclick="loadModule('glossary', 'Glossary')">
                    <div class="card-icon glossary-color"><i class="fa-solid fa-book-open"></i></div>
                    <div class="card-info">
                        <span class="card-value" id="statGlossary">-</span>
                        <span class="card-title">Glossary</span>
                    </div>
                </div>

                <!-- Profile Quick Stats -->
                <div class="dash-card" onclick="loadModule('profile', 'Profile')">
                    <div class="card-icon profile-color"><i class="fa-regular fa-user"></i></div>
                    <div class="card-info">
                        <span class="card-value" id="statProfile">View</span>
                        <span class="card-title">Profile</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Floating Dynamic macOS Dock -->
    <nav class="dock-container">
        <div class="dynamic-island" id="dynamicIsland">
            <button class="dock-item" onclick="loadModule('apps', 'Apps Module')" title="Apps Registry">
                <i class="fa-solid fa-layer-group"></i>
                <span class="dock-label">Apps</span>
            </button>
            <button class="dock-item" onclick="loadModule('goals', 'Weekly Goals')" title="Goals Planner">
                <i class="fa-solid fa-bullseye"></i>
                <span class="dock-label">Goals</span>
            </button>
            <button class="dock-item" onclick="loadModule('skills', 'Skills')" title="Skills Repository">
                <i class="fa-solid fa-bolt"></i>
                <span class="dock-label">Skills</span>
            </button>
            <button class="dock-item" onclick="loadModule('meetings', 'Meetings')" title="Meetings Manager">
                <i class="fa-solid fa-video"></i>
                <span class="dock-label">Meetings</span>
            </button>
            <button class="dock-item" onclick="loadModule('messages', 'Messages')" title="Encrypted Messages">
                <i class="fa-solid fa-shield-halved"></i>
                <span class="dock-label">Messages</span>
            </button>
            <button class="dock-item" onclick="loadModule('calendar', 'Calendar')" title="Event Calendar">
                <i class="fa-regular fa-calendar"></i>
                <span class="dock-label">Calendar</span>
            </button>           
            <button class="dock-item" onclick="loadModule('procedures', 'Procedures')" title="Procedural Guides">
                <i class="fa-solid fa-list-check"></i>
                <span class="dock-label">Guides</span>
            </button>
            <button class="dock-item" onclick="loadModule('glossary', 'Glossary')" title="Glossary Terms">
                <i class="fa-solid fa-book-open"></i>
                <span class="dock-label">Glossary</span>
            </button>
            <button class="dock-item" onclick="loadModule('profile', 'Profile')" title="User Profile">
                <i class="fa-regular fa-user"></i>
                <span class="dock-label">Profile</span>
            </button>
        </div>
    </nav>

    <!-- Session Warning Modal -->
    <div id="sessionWarningModal" class="session-modal" style="display: none;">
        <div class="session-modal-content">
            <h2>Your session is about to end</h2>
            <p>For your security, you will be logged out in <span id="sessionCountdown">10</span> seconds.</p>
            <button id="sessionRelogBtn" onclick="window.location.href='login.html';">Log in</button>
        </div>
    </div>

    <style>
        .session-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 29, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .session-modal-content {
            background: rgba(22, 30, 49, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 36px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: zoomIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .session-modal-content h2 {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            color: #fb7185;
            margin-bottom: 12px;
        }
        .session-modal-content p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        #sessionCountdown {
            font-weight: 700;
            color: white;
            font-size: 1.1rem;
        }
        #sessionRelogBtn {
            background: #6366f1;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        #sessionRelogBtn:hover {
            background: #4f46e5;
            transform: translateY(-1px);
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>

    <script>
        // Session countdown and alert monitor
        (function() {
            function monitorSession() {
                const sessionStr = localStorage.getItem('sessionUser');
                if (!sessionStr) {
                    window.location.href = 'login.html';
                    return;
                }
                
                let session = {};
                try {
                    session = JSON.parse(sessionStr);
                } catch(e) {}
                
                const now = Date.now();
                const expiry = session.expiry || 0;
                const remaining = expiry - now;
                
                const modal = document.getElementById('sessionWarningModal');
                const countdownEl = document.getElementById('sessionCountdown');
                
                if (remaining <= 0) {
                    localStorage.removeItem('sessionUser');
                    window.location.href = 'login.html';
                    return;
                }
                
                // Show modal in the last 10 seconds
                if (remaining <= 10000) {
                    if (modal && modal.style.display === 'none') {
                        modal.style.display = 'flex';
                    }
                    if (countdownEl) {
                        countdownEl.textContent = Math.ceil(remaining / 1000);
                    }
                } else {
                    if (modal && modal.style.display !== 'none') {
                        modal.style.display = 'none';
                    }
                }
            }
            
            setInterval(monitorSession, 1000);
        })();
    </script>

    <script src="app.js"></script>
</body>
</html>
