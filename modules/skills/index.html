<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../apps/styles.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Top header row -->
        <div class="header-container"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
            <h2 style="margin: 0 auto; border-bottom: none; padding-bottom: 0; font-size: 1.8rem;">
                <i class="fa-solid fa-brain" style="color: #fbbf24;"></i> Standards & Skills Repository
            </h2>
        </div>

        <!-- Search Bar & Action -->
        <div class="header-actions" style="margin-bottom: 24px; display: flex; gap: 16px;">
            <div class="search-input-wrapper" style="flex: 1;">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchSkills" placeholder="Search standard guides by title, content or contributor..." oninput="render()">
            </div>
            <button onclick="openSkillModal()" style="width: auto; padding: 10px 18px; font-size: 0.9rem; background: #fbbf24; border-color: #fbbf24; color: #1e1b4b; font-weight: 600;">
                <i class="fa-solid fa-plus-circle"></i> Share Standard
            </button>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px; align-items: start;">
            <!-- Directory List -->
            <div>
                <h3 style="margin-bottom: 16px;"><i class="fa-solid fa-folder-open"></i> Shared Standards Directory</h3>
                <div id="skillsContainer" class="list-container"></div>
            </div>

            <!-- Contributors Panel -->
            <div style="background: rgba(251, 191, 36, 0.04); border: 1px solid rgba(251, 191, 36, 0.1); padding: 20px; border-radius: 16px; position: sticky; top: 20px;">
                <h3 style="margin-bottom:16px; color:#fbbf24; border-bottom: none; padding-bottom: 0;"><i class="fa-solid fa-award"></i> Top Contributors</h3>
                <div id="skillsLeaderboard" style="display:flex; flex-direction:column; gap:8px;"></div>
            </div>
        </div>
    </div>

    <!-- Share Standard Modal -->
    <div id="skillModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0 auto;"><i class="fa-solid fa-pen-nib"></i> Share Standard / Skill</h3>
                <span class="close-btn" onclick="closeSkillModal()">&times;</span>
            </div>
            <div class="modal-body">
                <label for="contribName" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px;">Your Name</label>
                <input type="text" id="contribName" placeholder="e.g. Alice" required>
                
                <label for="skillTitle" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:14px;">Skill Title</label>
                <input type="text" id="skillTitle" placeholder="e.g. Clean Git Rebase Workflow" required>
                
                <label for="skillDesc" style="font-size:0.85rem; color:#9ca3af; display:block; margin-bottom:6px; margin-top:14px;">Guidance Details</label>
                <textarea id="skillDesc" placeholder="Describe the standards, commands, or advice clearly..." required style="min-height: 120px;"></textarea>
                
                <button onclick="addSkill()" style="margin-top:20px; background: #fbbf24; border-color: #fbbf24; color: #1e1b4b; font-weight: 600;"><i class="fa-solid fa-bullhorn"></i> Publish Standard</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
